name: 'AI CCO'

# ============================================
# Leaper Agent 运行配置
# 只需修改下方标注 [必填] 的项目
# ============================================

# [必填] 模型配置 — 选一个取消注释
# --- OpenAI ---
# model:
#   provider: openai
#   name: gpt-4o
#   apiKey: 'sk-your-key'

# --- Anthropic ---
# model:
#   provider: anthropic
#   name: claude-sonnet-4-20250514
#   apiKey: 'sk-ant-your-key'

# --- Ollama 本地 ---
# model:
#   provider: ollama
#   name: qwen2.5:7b

# --- 自定义 API ---
# model:
#   provider: openai-compatible
#   name: your-model-name
#   baseUrl: 'http://your-api:8000/v1'
#   apiKey: 'your-key'

# [必填] Telegram Bot Token
channel:
  type: telegram
  token: 'YOUR_BOT_TOKEN_HERE'

# 记忆引擎（默认开启）
brain:
  enabled: true

# 六层进化（默认开启）
evolution:
  enabled: true

# 代理（如需翻墙）
# proxy: 'http://127.0.0.1:10809'

# ============================================
# 工具集（默认全开，通常不需要修改）
# ============================================
# 已包含：搜索、浏览器、文件读写、代码执行、
#         记忆、技能管理、定时任务、视觉分析等
toolsets: ["hermes-cli"]

# 如果只需要部分工具，可以替换为：
# toolsets: ["web", "files", "memory"]
#
# 可用的工具集：
# - web        搜索 + 网页抓取
# - browser    浏览器自动化
# - terminal   终端命令执行
# - files      文件读写
# - vision     图片分析
# - image_gen  图片生成（需配 API key）
# - skills     技能管理
# - memory     记忆工具